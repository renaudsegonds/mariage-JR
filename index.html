<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">

<title>Jade & Renaud</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:linear-gradient(180deg,#f7f4ef,#ebe4d7);
font-family:Poppins,sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.card{
max-width:520px;
width:100%;
background:white;
padding:50px 35px;
border-radius:25px;
box-shadow:0 15px 40px rgba(0,0,0,.12);
text-align:center;
}

h1{
font-family:"Cormorant Garamond",serif;
font-size:60px;
color:#5b5a45;
margin-bottom:10px;
}

.date{
font-size:22px;
letter-spacing:2px;
margin-bottom:40px;
color:#8b856d;
}

p{
font-size:18px;
color:#555;
margin-bottom:30px;
}

.button{
display:block;
width:100%;
padding:17px;
margin-top:15px;
background:#7f8c69;
color:white;
text-decoration:none;
border-radius:12px;
font-size:18px;
transition:.25s;
}

.button:hover{
background:#687355;
}

.footer{
margin-top:35px;
font-size:14px;
color:#888;
}

</style>

</head>

<body>

<div class="card">

<h1>Jade & Renaud</h1>

<div class="date">
04 septembre 2027
</div>

<p>
Nous avons hâte de partager cette journée avec vous ❤️
</p>

<a class="button"
href="https://www.google.com/maps?q=Mairie+de+L%27Isle-Jourdain+Gers"
target="_blank">

📍 15h30 Cérémonie Officielle - Mairie de L'Isle-Jourdain

</a>

<a class="button"
href="https://www.google.com/maps?q=Domaine+de+Solomiac+32120"
target="_blank">

🌿 17H00 Cérémonie Laïque/Réception - Domaine de Solomiac

</a>

<div class="footer">
À très bientôt ❤️
</div>

</div>

</body>
</html>
